name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          # Placeholder values for build-time env validation — no real connections are made during build
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          AUTH_SECRET: ci-secret-min-32-chars-placeholder!!
          AUTH_URL: http://localhost:3000
          AUTH_GOOGLE_ID: ci-google-id-placeholder
          AUTH_GOOGLE_SECRET: ci-google-secret-placeholder
          AUTH_RESEND_KEY: re_ci_placeholder_key
          AUTH_EMAIL_FROM: noreply@ci.example.com
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_APP_NAME: Interview Tracker
